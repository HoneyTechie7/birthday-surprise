<!DOCTYPE html>
<html>

<head>

<title>Secret Vault</title>

<link rel="stylesheet" href="style.css">

<style>

.vault{

max-width:390px;

margin:auto;

padding:20px;

text-align:center;

}


.gifts{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin:30px 0;

}

.gift{

font-size:55px;

cursor:pointer;

transition:.3s;

text-align:center;

}

.gift:hover{

transform:scale(1.15);

}

#message{

margin-top:25px;

padding:15px;

border-radius:15px;

background:
rgba(255,255,255,0.1);

min-height:120px;
}
</style>

</head>

<body>

<div class="vault">

<h1>🎁 Secret Messages</h1>

<div class="gifts">

<div class="gift" onclick="showMessage(0,this)">🎁</div>
<div class="gift" onclick="showMessage(1,this)">🎀</div>
<div class="gift" onclick="showMessage(2,this)">🎁</div>
<div class="gift" onclick="showMessage(3,this)">🎀</div>
<div class="gift" onclick="showMessage(4,this)">🎁</div>
<div class="gift" onclick="showMessage(5,this)">🎀</div>

</div>

<div id="message">

Click a gift box ❤️

</div>

<button
onclick="location.href='quiz.html'">

NEXT LEVEL ➜

</button>

</div>

<script>

const messages = [

"Oka secret cheppana? 🤫, Nuvvu anukune danikante ekkuva strong vi 💪🔥",

"😡 Angry Siva detected. Count 10 numbers, Drink water and remember I'm cute 😌",

"🤗 Congrats! You just won The Best Girlfriend Ever! 😴",

"😔 Silent ga amayakamga kanipistavu kani, asala kadu ne gurinchi naku matrame telsu 🤫",

"🚀 Nuvvu achieve cheyyali anukunna vati kosam fight cheyyi.",

"❤️ Every memory of us is safely stored in my heart."

];


function showMessage(index, gift){

document.getElementById("message").innerHTML =
messages[index];

gift.innerHTML = "📦";

gift.style.opacity = "0.7";

gift.style.transform = "scale(0.9)";

}

</script>

</body>

</html>
