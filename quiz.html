<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siva Challenge</title>

<link rel="stylesheet" href="style.css">

<style>

.quiz-card{

max-width:450px;

margin:40px auto;

background:#161616;

padding:25px;

border-radius:20px;

border:2px solid #ff3b3b;

text-align:center;

}

.progress{

margin-bottom:20px;

font-size:18px;

color:#ffd166;

}

.question{

font-size:22px;

margin-bottom:20px;

}

.option{

display:block;

background:#222;

padding:15px;

margin:10px 0;

border-radius:10px;

cursor:pointer;

}

.option:hover{

background:#333;

}

textarea,input{

width:100%;

padding:12px;

margin-top:10px;

border-radius:10px;

border:none;

}

.next-btn{

margin-top:20px;

width:100%;

padding:15px;

border:none;

border-radius:10px;

background:#ff3b3b;

color:white;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="quiz-card">

<div class="progress" id="progress">
🏁 Quiz 1 / 10
</div>

<div class="question" id="question"></div>

<div id="answers"></div>

<button class="next-btn" onclick="nextQuestion()">
Next ➜
</button>


</div>

<script src="quiz.js"></script>

</body>

</html>
